name: Validate mirror state

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  GH_TOKEN:         ${{ secrets.GH_TOKEN }}
  GH_TOKEN_SOURCE:  ${{ secrets.GH_TOKEN_SOURCE }}
  SOURCE_ORG:       ${{ vars.SOURCE_ORG }}
  TARGET_ORG:       constructorfabric

jobs:
  validate:
    name: Run validation checks
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------ #
      - name: Checkout control repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      # ------------------------------------------------------------------ #
      - name: Set up git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ------------------------------------------------------------------ #
      - name: Ensure tools available
        run: |
          which gh  || sudo apt-get install -y gh
          which jq  || sudo apt-get install -y jq
          which git || sudo apt-get install -y git

      # ------------------------------------------------------------------ #
      - name: Make scripts executable
        run: |
          chmod +x mirror/validate/run-validation.sh
          chmod +x mirror/lib/common.sh

      # ------------------------------------------------------------------ #
      - name: Run validation
        id: validate
        run: |
          set +e
          mirror/validate/run-validation.sh
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0   # Always continue so we can commit the report

      # ------------------------------------------------------------------ #
      - name: Commit validation report
        run: |
          git add validation-reports/ || true
          if ! git diff --cached --quiet; then
            git commit --allow-empty \
              -m "mirror: validation report $(date -u +%Y-%m-%dT%H-%M-%SZ) [skip ci]"
            git push
          else
            echo "No new validation report to commit"
          fi

      # ------------------------------------------------------------------ #
      - name: Upload validation report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: validation-report-${{ github.run_id }}
          path: validation-reports/
          retention-days: 90

      # ------------------------------------------------------------------ #
      - name: Fail if validation found errors
        if: steps.validate.outputs.exit_code != '0'
        run: |
          echo "Validation found failures — see report in validation-reports/"
          exit 1
