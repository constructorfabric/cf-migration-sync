name: Continuous mirror cyberfabric → constructorfabric

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours; adjust or disable after cutover
  workflow_dispatch:
    inputs:
      since:
        description: "Override last-sync timestamp (ISO 8601, e.g. 2026-05-22T00:00:00Z). Leave blank to use stored value."
        required: false
        default: ""
      skip_issues:
        description: "Skip issue/PR sync (set to 'true' for a code-only run)"
        required: false
        default: "false"

concurrency:
  group: cf-mirror
  cancel-in-progress: false   # never abort a running sync mid-way

permissions:
  contents: write   # needed to commit the updated last_sync_at.txt

env:
  SOURCE_ORG: cyberfabric
  TARGET_ORG: constructorfabric
  # Single token with repo + admin:org scopes on both orgs (same person owns both)
  SOURCE_TOKEN: ${{ secrets.MIGRATION_TOKEN }}
  TARGET_TOKEN: ${{ secrets.MIGRATION_TOKEN }}
  STATE_FILE: last_sync_at.txt

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Mirror all git refs (branches + tags) for every changed repo
  # Adapted from cyberfabric-governance/mc — compares refs before cloning.
  # ─────────────────────────────────────────────────────────────────────────────
  mirror-code:
    name: Mirror git refs
    runs-on: ubuntu-latest
    steps:
      - name: Install Git LFS
        run: git lfs install

      - name: Mirror changed repositories
        shell: bash
        run: |
          set -euo pipefail

          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT
          cd "$workdir"

          echo "Listing private repos in ${SOURCE_ORG}..."
          GH_TOKEN="${SOURCE_TOKEN}" gh repo list "${SOURCE_ORG}" \
            --limit 1000 \
            --json name,nameWithOwner,isPrivate \
            --jq '.[] | select(.isPrivate == true) | [.nameWithOwner, .name] | @tsv' |
          while IFS=$'\t' read -r source_full repo; do
            echo "::group::${source_full}"

            source_url="https://x-access-token:${SOURCE_TOKEN}@github.com/${source_full}.git"
            target_full="${TARGET_ORG}/${repo}"
            target_url="https://x-access-token:${TARGET_TOKEN}@github.com/${target_full}.git"

            source_refs="${workdir}/${repo}.source.refs"
            target_refs="${workdir}/${repo}.target.refs"
            needs_mirror=false

            # Read source refs; skip repo if unreachable
            if ! git ls-remote --heads --tags "${source_url}" \
              | sed '/\^{}$/d' | sort > "${source_refs}"; then
              echo "Cannot read source refs for ${source_full} — skipping."
              echo "::endgroup::"
              continue
            fi

            # Create target repo if it doesn't exist yet
            if ! GH_TOKEN="${TARGET_TOKEN}" gh repo view "${target_full}" >/dev/null 2>&1; then
              echo "Creating ${target_full}..."
              desc=$(GH_TOKEN="${SOURCE_TOKEN}" gh api repos/${source_full} --jq '.description // ""')
              GH_TOKEN="${TARGET_TOKEN}" gh repo create "${target_full}" --private
              GH_TOKEN="${TARGET_TOKEN}" gh repo edit "${target_full}" --description "${desc}"
              needs_mirror=true
            else
              # Compare refs; skip if identical
              if git ls-remote --heads --tags "${target_url}" \
                | sed '/\^{}$/d' | sort > "${target_refs}" \
                && cmp -s "${source_refs}" "${target_refs}"; then
                echo "Refs identical — skipping ${source_full}."
                echo "::endgroup::"
                continue
              fi
              needs_mirror=true
            fi

            [ "${needs_mirror}" != true ] && { echo "::endgroup::"; continue; }

            echo "Cloning ${source_full}..."
            if ! git clone --mirror "${source_url}" "${repo}.git"; then
              echo "Clone failed — skipping."
              echo "::endgroup::"
              continue
            fi

            cd "${repo}.git"
            git config --unset-all remote.origin.mirror || true
            git remote set-url --push origin "${target_url}"

            git fetch -p origin
            git push --prune origin '+refs/heads/*:refs/heads/*'
            git push --prune origin '+refs/tags/*:refs/tags/*'

            # LFS objects (best-effort)
            git lfs fetch --all origin || true
            git lfs push --all "${target_url}" || true

            cd "$workdir"
            rm -rf "${repo}.git"
            echo "Mirrored: ${source_full}"
            echo "::endgroup::"
          done

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Incrementally sync labels, milestones, issues, and open PRs
  # Uses last_sync_at.txt committed in this repo to track the watermark.
  # Issues are deduplicated via an HTML comment marker in the body:
  #   <!-- cf-mirror: cyberfabric/REPO#NUMBER -->
  # ─────────────────────────────────────────────────────────────────────────────
  sync-metadata:
    name: Sync issues & PRs
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_issues != 'true' }}
    steps:
      - name: Checkout this repo (for state file)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MIGRATION_TOKEN }}

      - name: Determine since-timestamp AND capture run-start
        id: since
        shell: bash
        run: |
          # Capture run-start NOW so we don't lose issues created during this run
          RUN_START=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          echo "run_start=${RUN_START}" >> "$GITHUB_OUTPUT"
          echo "Run start (will become next watermark): $RUN_START"

          OVERRIDE="${{ github.event.inputs.since }}"
          if [ -n "$OVERRIDE" ]; then
            echo "since=${OVERRIDE}" >> "$GITHUB_OUTPUT"
            echo "Using override: $OVERRIDE"
          elif [ -s "$STATE_FILE" ]; then
            TS=$(cat "$STATE_FILE")
            echo "since=${TS}" >> "$GITHUB_OUTPUT"
            echo "Using stored: $TS"
          else
            # First run — go back 30 days to catch anything after initial migration
            TS=$(date -u -d '30 days ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null \
              || date -u -v-30d '+%Y-%m-%dT%H:%M:%SZ')
            echo "since=${TS}" >> "$GITHUB_OUTPUT"
            echo "No state file found — using: $TS"
          fi

      - name: Sync labels and milestones (idempotent)
        shell: bash
        run: |
          set -euo pipefail

          GH_TOKEN="${SOURCE_TOKEN}" gh repo list "${SOURCE_ORG}" \
            --limit 1000 --json name --jq '.[].name' |
          while read -r repo; do

            # ── Labels ──
            GH_TOKEN="${SOURCE_TOKEN}" gh api repos/${SOURCE_ORG}/${repo}/labels \
              --paginate --jq '.[]' 2>/dev/null |
            while read -r lbl; do
              name=$(echo "$lbl"  | jq -r '.name')
              color=$(echo "$lbl" | jq -r '.color')
              desc=$(echo "$lbl"  | jq -r '.description // ""')
              # Try create; fall back to update
              GH_TOKEN="${TARGET_TOKEN}" gh api repos/${TARGET_ORG}/${repo}/labels \
                -X POST -f name="$name" -f color="$color" -f description="$desc" \
                2>/dev/null || \
              GH_TOKEN="${TARGET_TOKEN}" gh api \
                "repos/${TARGET_ORG}/${repo}/labels/$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$name")" \
                -X PATCH -f color="$color" -f description="$desc" 2>/dev/null || true
            done

            # ── Milestones ──
            GH_TOKEN="${SOURCE_TOKEN}" gh api repos/${SOURCE_ORG}/${repo}/milestones \
              --paginate --jq '.[]' 2>/dev/null |
            while read -r ms; do
              title=$(echo "$ms" | jq -r '.title')
              state=$(echo "$ms" | jq -r '.state')
              desc=$(echo "$ms"  | jq -r '.description // ""')
              due=$(echo "$ms"   | jq -r '.due_on // empty')
              PAYLOAD=$(jq -n \
                --arg t "$title" --arg s "$state" --arg d "$desc" \
                '{title:$t,state:$s,description:$d}')
              [ -n "$due" ] && PAYLOAD=$(echo "$PAYLOAD" | jq --arg due "$due" '.+{due_on:$due}')
              # Create if not exists (match by title)
              EXISTS=$(GH_TOKEN="${TARGET_TOKEN}" gh api \
                "repos/${TARGET_ORG}/${repo}/milestones" --paginate \
                --jq ".[] | select(.title==\"$title\") | .number" 2>/dev/null | head -1)
              if [ -z "$EXISTS" ]; then
                GH_TOKEN="${TARGET_TOKEN}" gh api repos/${TARGET_ORG}/${repo}/milestones \
                  -X POST --input - <<< "$PAYLOAD" 2>/dev/null || true
              fi
            done

          done

      - name: Sync new and updated issues
        shell: bash
        env:
          SINCE: ${{ steps.since.outputs.since }}
        run: |
          set -euo pipefail

          GH_TOKEN="${SOURCE_TOKEN}" gh repo list "${SOURCE_ORG}" \
            --limit 1000 --json name --jq '.[].name' |
          while read -r repo; do

            # Get issues updated since watermark (all states)
            GH_TOKEN="${SOURCE_TOKEN}" gh api \
              "repos/${SOURCE_ORG}/${repo}/issues?state=all&direction=asc&since=${SINCE}&per_page=100" \
              --paginate --jq '.[] | select(.pull_request == null)' 2>/dev/null |
            while read -r issue; do
              number=$(echo "$issue" | jq -r '.number')
              title=$(echo "$issue"   | jq -r '.title')
              body=$(echo "$issue"    | jq -r '.body // ""')
              state=$(echo "$issue"   | jq -r '.state')
              author=$(echo "$issue"  | jq -r '.user.login')
              created=$(echo "$issue" | jq -r '.created_at')
              labels=$(echo "$issue"  | jq -r '[.labels[].name]')

              MARKER="<!-- cf-mirror: ${SOURCE_ORG}/${repo}#${number} -->"

              # Check if this issue was already created in target.
              # NOTE: search for the FULL marker including trailing ` -->` to avoid
              # false-positive prefix matches (e.g. #1 matching #10, #12, #100).
              EXISTING=$(GH_TOKEN="${TARGET_TOKEN}" gh api \
                "repos/${TARGET_ORG}/${repo}/issues?state=all&per_page=100" \
                --paginate \
                --jq ".[] | select(.body != null and (.body | contains(\"cf-mirror: ${SOURCE_ORG}/${repo}#${number} -->\"))) | .number" \
                2>/dev/null | head -1)

              new_body="${MARKER}
> 📌 Originally by @${author} on ${created}

${body}"

              if [ -z "$EXISTING" ]; then
                # Create new issue
                PAYLOAD=$(jq -n \
                  --arg title "$title" \
                  --arg body "$new_body" \
                  --argjson labels "$labels" \
                  '{title:$title,body:$body,labels:$labels}')

                NEW=$(GH_TOKEN="${TARGET_TOKEN}" gh api repos/${TARGET_ORG}/${repo}/issues \
                  -X POST --input - <<< "$PAYLOAD" 2>/dev/null)
                NEW_NUMBER=$(echo "$NEW" | jq -r '.number // empty')
                [ -z "$NEW_NUMBER" ] && continue

                # Migrate comments
                GH_TOKEN="${SOURCE_TOKEN}" gh api \
                  "repos/${SOURCE_ORG}/${repo}/issues/${number}/comments" \
                  --paginate --jq '.[]' 2>/dev/null |
                while read -r comment; do
                  c_author=$(echo "$comment"  | jq -r '.user.login')
                  c_created=$(echo "$comment" | jq -r '.created_at')
                  c_body=$(echo "$comment"    | jq -r '.body')
                  GH_TOKEN="${TARGET_TOKEN}" gh api \
                    repos/${TARGET_ORG}/${repo}/issues/${NEW_NUMBER}/comments \
                    -X POST -f body="> 💬 Originally by @${c_author} on ${c_created}

${c_body}" 2>/dev/null || true
                  sleep 0.2
                done

                # Close if closed in source
                [ "$state" = "closed" ] && \
                  GH_TOKEN="${TARGET_TOKEN}" gh api repos/${TARGET_ORG}/${repo}/issues/${NEW_NUMBER} \
                    -X PATCH -f state="closed" 2>/dev/null || true

                echo "  Created issue: ${repo}#${number} → #${NEW_NUMBER}"

              else
                # Update existing issue (body + state)
                GH_TOKEN="${TARGET_TOKEN}" gh api repos/${TARGET_ORG}/${repo}/issues/${EXISTING} \
                  -X PATCH \
                  -f body="$new_body" \
                  -f state="$state" \
                  -f title="$title" 2>/dev/null || true
                echo "  Updated issue: ${repo}#${number} (target #${EXISTING})"
              fi

              sleep 0.4
            done

          done

      - name: Sync new open pull requests
        shell: bash
        env:
          SINCE: ${{ steps.since.outputs.since }}
        run: |
          set -euo pipefail

          GH_TOKEN="${SOURCE_TOKEN}" gh repo list "${SOURCE_ORG}" \
            --limit 1000 --json name --jq '.[].name' |
          while read -r repo; do

            GH_TOKEN="${SOURCE_TOKEN}" gh api \
              "repos/${SOURCE_ORG}/${repo}/pulls?state=open&direction=asc&per_page=100" \
              --paginate \
              --jq ".[] | select(.created_at >= \"${SINCE}\")" 2>/dev/null |
            while read -r pr; do
              number=$(echo "$pr" | jq -r '.number')
              title=$(echo "$pr"  | jq -r '.title')
              body=$(echo "$pr"   | jq -r '.body // ""')
              head=$(echo "$pr"   | jq -r '.head.ref')
              base=$(echo "$pr"   | jq -r '.base.ref')
              author=$(echo "$pr" | jq -r '.user.login')
              created=$(echo "$pr"| jq -r '.created_at')
              draft=$(echo "$pr"  | jq -r '.draft')
              labels=$(echo "$pr" | jq -r '[.labels[].name]')

              MARKER="<!-- cf-mirror: ${SOURCE_ORG}/${repo}#PR${number} -->"

              # Skip if already mirrored (full-marker match to avoid prefix collisions)
              EXISTING=$(GH_TOKEN="${TARGET_TOKEN}" gh api \
                "repos/${TARGET_ORG}/${repo}/pulls?state=open&per_page=100" \
                --paginate \
                --jq ".[] | select(.body != null and (.body | contains(\"cf-mirror: ${SOURCE_ORG}/${repo}#PR${number} -->\"))) | .number" \
                2>/dev/null | head -1)
              [ -n "$EXISTING" ] && { echo "  PR #${number} already mirrored"; continue; }

              # Verify head branch exists in target
              BRANCH=$(GH_TOKEN="${TARGET_TOKEN}" gh api \
                repos/${TARGET_ORG}/${repo}/branches/${head} \
                --jq '.name' 2>/dev/null || echo "")
              [ -z "$BRANCH" ] && { echo "  SKIP PR #${number}: branch ${head} not in target yet"; continue; }

              new_body="${MARKER}
> 📌 Originally by @${author} on ${created} (was PR #${number} in ${SOURCE_ORG})

${body}"

              PAYLOAD=$(jq -n \
                --arg title "$title" \
                --arg body "$new_body" \
                --arg head "$head" \
                --arg base "$base" \
                --argjson draft "$draft" \
                '{title:$title,body:$body,head:$head,base:$base,draft:$draft}')

              NEW=$(GH_TOKEN="${TARGET_TOKEN}" gh api repos/${TARGET_ORG}/${repo}/pulls \
                -X POST --input - <<< "$PAYLOAD" 2>/dev/null)
              NEW_NUMBER=$(echo "$NEW" | jq -r '.number // empty')
              [ -z "$NEW_NUMBER" ] && continue

              [ "$labels" != "[]" ] && \
                GH_TOKEN="${TARGET_TOKEN}" gh api repos/${TARGET_ORG}/${repo}/issues/${NEW_NUMBER}/labels \
                  -X POST --input - <<< "{\"labels\":$labels}" 2>/dev/null || true

              echo "  Created PR: ${repo}#${number} → #${NEW_NUMBER}"
              sleep 0.4
            done

          done

      - name: Update watermark and commit state file
        shell: bash
        env:
          NEW_TS: ${{ steps.since.outputs.run_start }}
        run: |
          # Use the timestamp captured BEFORE the sync started, so any issues created
          # during this run are picked up by the next run.
          echo "$NEW_TS" > "$STATE_FILE"
          git config user.name  "cf-mirror-bot"
          git config user.email "cf-mirror-bot@users.noreply.github.com"
          git add "$STATE_FILE"
          git diff --cached --quiet || git commit -m "chore: update mirror watermark to ${NEW_TS}"
          git push
